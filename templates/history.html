<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body>
    <canvas id="canvas-background"></canvas>

    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <h2 class="mb-0">History</h2>
            <a href="/" class="btn btn-primary btn-sm">New</a>
        </div>
        
        <div class="row justify-content-center mb-5">
            <div class="col-lg-8">
                <form action="/history" method="get" class="search-box-container">
                    <div class="input-group">
                        <input type="text" name="q" class="form-control search-input" 
                               placeholder="Search memories..." value="{{ search_query or '' }}">
                        <button class="btn btn-primary" type="submit">Search</button>
                    </div>
                </form>
            </div>
        </div>
        
        <div class="timeline">
            {% if not records %}
            <div class="py-5 text-muted text-center card bg-transparent border-0">
                <p class="fs-5">No entries found.</p>
                {% if search_query %}
                <a href="/history" class="btn btn-link text-muted">Clear Search</a>
                {% endif %}
            </div>
            {% endif %}

            {% for row in records %}
            <div class="position-relative mb-4">
                <div class="timeline-dot"></div>
                
                <a href="/entry/{{ row.Timestamp }}" class="text-decoration-none text-reset">
                    <div class="card card-hover-effect border-0 shadow-sm" style="transition: transform 0.2s;">
                        <div class="card-body p-4">
                            
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <span class="text-muted small" style="font-family: var(--font-hand);">
                                    {{ row.Timestamp }}
                                </span>
                                {% if row.Mood and row.Mood.label %}
                                <span class="badge rounded-pill" 
                                      style="background-color: {{ row.Mood.color }}; font-weight: normal; opacity: 0.9;">
                                    {{ row.Mood.label }}
                                </span>
                                {% endif %}
                            </div>

                            <h5 class="fw-bold mb-2 text-dark" style="font-family: var(--font-hand); font-size: 1.4rem;">
                                {{ row.Title }}
                            </h5>

                            <p class="text-muted mb-0 text-truncate" style="font-family: var(--font-reading);">
                                {{ row.Original | truncate(80) }}
                            </p>
                            
                            </div>
                    </div>
                </a>
            </div>
            {% endfor %}
        </div>
    </div>
    
    <script src="{{ url_for('static', filename='script.js') }}"></script>
    
    <style>
        .card-hover-effect:hover {
            transform: translateY(-3px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.08) !important;
            cursor: pointer;
        }
    </style>
</body>
</html>
