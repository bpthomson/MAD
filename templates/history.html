<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <h2 class="mb-4">Diary History</h2>
        <a href="/" class="btn btn-primary mb-3">Back to Write</a>
        
        <div class="list-group">
            {% for row in records %}
            <div class="list-group-item list-group-item-action flex-column align-items-start mb-2 shadow-sm border rounded">
                <div class="d-flex w-100 justify-content-between">
                    <h5 class="mb-1">{{ row.Title }}</h5>
                    <small>{{ row.Timestamp }}</small>
                </div>
                <p class="mb-1 text-truncate" style="max-width: 80%;">{{ row.Original }}</p>
                <small class="text-success">Review: {{ row.Comment }}</small>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
