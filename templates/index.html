<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diary</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body>
    <canvas id="canvas-background"></canvas>

    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-baseline mb-4">
            <div>
                <h2 class="mb-0">{% if is_edit %}Edit Entry{% else %}My Diary{% endif %}</h2>
                <div class="text-muted small mt-1" style="font-family: var(--font-hand);">
                    <script>
                        document.write(new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' }));
                    </script>
                </div>
            </div>
            <a href="/history" class="btn btn-outline-secondary btn-sm">History</a>
        </div>
        
        {% if error %}
        <div class="alert alert-danger shadow-sm border-0 rounded-2 mb-3">
            {{ error }}
        </div>
        {% endif %}

        <div class="row g-4">
            <div class="col-lg-8">
                <form method="POST" action="/" onsubmit="showLoading()">
                    
                    {% if old_timestamp %}
                    <input type="hidden" name="old_timestamp" value="{{ old_timestamp }}">
                    {% endif %}

                    <div class="mb-2 d-flex align-items-center gap-2">
                        <label for="dateInput" class="text-muted small" style="font-family: var(--font-hand);">Date:</label>
                        <input type="date" name="date" id="dateInput" class="custom-date-input py-1 px-2" style="font-size: 1rem;" required value="{{ date_value }}">
                    </div>

                    <div class="mb-3">
                        <textarea class="form-control shadow-sm" name="content" rows="9" 
                                  placeholder="Write freely..." required>{{ content or '' }}</textarea>
                    </div>
                    
                    <div class="d-flex gap-2">
                        <button type="submit" id="submitBtn" class="btn btn-primary px-5 shadow-sm">
                            {% if is_edit %}Update & Polish{% else %}Polish Entry{% endif %}
                        </button>
                        {% if is_edit %}
                        <a href="/history" class="btn btn-outline-secondary">Cancel</a>
                        {% endif %}
                        <button class="btn btn-primary px-5 shadow-sm" id="loadingBtn" type="button" disabled style="display: none;">Analyzing...</button>
                    </div>
                </form>
            </div>

            <div class="col-lg-4">
                <div id="calendar-container" class="calendar-widget shadow-sm" style="height: 100%;">
                    <div class="calendar-header">
                        <button onclick="changeMonth(-1)">&lt;</button>
                        <span id="calendar-month-year">...</span>
                        <button onclick="changeMonth(1)">&gt;</button>
                    </div>
                    <div id="calendar-grid" class="calendar-grid"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('SW Registered!', reg.scope))
                    .catch(err => console.log('SW Failed', err));
            });
        }
    </script>
</body>
</html>
