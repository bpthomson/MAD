<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diary</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body>
    <canvas id="canvas-background"></canvas>

    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-baseline mb-5">
            <div>
                <h2 class="mb-0">My Diary</h2>
                <div class="text-muted small mt-1" style="font-family: var(--font-hand);">
                    <script>
                        document.write(new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' }));
                    </script>
                </div>
            </div>
            <a href="/history" class="btn btn-outline-secondary btn-sm">History</a>
        </div>
        
        {% if error %}
        <div class="alert alert-danger shadow-sm border-0 rounded-2 mb-4">
            {{ error }}
        </div>
        {% endif %}

        <div class="row g-5">
            <div class="col-lg-8">
                <form method="POST" onsubmit="showLoading()">
                    <div class="mb-3 d-flex align-items-center gap-2">
                        <label for="dateInput" class="text-muted" style="font-family: var(--font-hand);">Entry Date:</label>
                        <input type="date" name="date" id="dateInput" class="custom-date-input" required>
                    </div>

                    <div class="mb-5">
                        <textarea class="form-control" name="content" rows="12" 
                                  placeholder="Write freely..." required>{{ content or '' }}</textarea>
                    </div>
                    
                    <div class="text-center">
                        <button type="submit" id="submitBtn" class="btn btn-primary">
                            Polish Entry
                        </button>
                        
                        <button class="btn btn-primary" id="loadingBtn" type="button" disabled style="display: none;">
                            Writing...
                        </button>
                    </div>
                </form>
            </div>

            <div class="col-lg-4">
                <div id="calendar-container" class="calendar-widget">
                    <div class="calendar-header">
                        <button onclick="changeMonth(-1)">&lt;</button>
                        <span id="calendar-month-year">May 2026</span>
                        <button onclick="changeMonth(1)">&gt;</button>
                    </div>
                    <div id="calendar-grid" class="calendar-grid">
                        </div>
                    <div class="text-center mt-3 small text-muted">
                        • indicates entry exists
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
