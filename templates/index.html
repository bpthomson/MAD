<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Diary</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>My English Diary</h2>
            <a href="/history" class="btn btn-outline-secondary">View History</a>
        </div>
        
        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <div class="card shadow-sm">
            <div class="card-body">
                <form method="POST" onsubmit="showLoading()">
                    <div class="mb-3">
                        <textarea class="form-control" name="content" rows="12" placeholder="Write your day here... (Supports Markdown)" style="font-size: 1.1rem;"></textarea>
                    </div>
                    <div class="d-grid">
                        <button type="submit" id="submitBtn" class="btn btn-primary btn-lg">Analyze & Save</button>
                        
                        <button class="btn btn-primary btn-lg" id="loadingBtn" type="button" disabled style="display: none;">
                            <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
                            AI is analyzing & saving...
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        function showLoading() {
            const content = document.querySelector('textarea[name="content"]').value;
            // 如果內容是空的，不要顯示 Loading，讓瀏覽器處理必填驗證 (雖然這邊沒設 required，但建議擋一下)
            if (content.trim() === "") return;

            // 隱藏提交按鈕，顯示 Loading 按鈕
            document.getElementById('submitBtn').style.display = 'none';
            document.getElementById('loadingBtn').style.display = 'block';
        }
    </script>
</body>
</html>
